  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Define the derivation that creates a single request with template support.

    The template is provided externally via <xref href="Microsoft.Accordant.TestGenerationOptions.RequestTemplates" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public RequestDerivation As<TReq, TResp, TResult>(Func<TReq, TResp, TResult, TResult> factory)
    parameters:
    - id: factory
      type: System.Func{{TReq},{TResp},{TResult},{TResult}}
      description: Function that creates the derived request from source request/response and template.
    typeParameters:
    - id: TReq
      description: The source operation's request type.
    - id: TResp
      description: The source operation's response type.
    - id: TResult
      description: The derived request type (also used as template type).
    return:
      type: Microsoft.Accordant.RequestDerivation
    content.vb: Public Function [As](Of TReq, TResp, TResult)(factory As Func(Of TReq, TResp, TResult, TResult)) As RequestDerivation
