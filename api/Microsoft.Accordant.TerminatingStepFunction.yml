      repo: https://github.com/microsoft/accordant.git
    id: GetStepResults
    path: Accordant/StepFunction/IStepFunction.cs
    startLine: 139
  assemblies:
  - Accordant
  namespace: Microsoft.Accordant
  summary: >-
    Implement this method to define the possible state transitions.

    This method is only called when <xref href="Microsoft.Accordant.TerminatingStepFunction.IsTerminalState" data-throw-if-not-resolved="false"></xref> returns false.


    For a single deterministic outcome, return a single StepResult.

    For non-deterministic outcomes, return multiple StepResults.
  example: []
  syntax:
    content: protected abstract IList<StepResult> GetStepResults(State state)
    parameters:
    - id: state
      type: Microsoft.Accordant.State
      description: The current state (do not mutate directly; clone first).
    return:
      type: System.Collections.Generic.IList{Microsoft.Accordant.StepResult}
      description: The list of possible next states.
    content.vb: Protected MustOverride Function GetStepResults(state As State) As IList(Of StepResult)
  overload: Microsoft.Accordant.TerminatingStepFunction.GetStepResults*
