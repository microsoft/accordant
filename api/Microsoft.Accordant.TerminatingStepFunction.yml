    path: Accordant/StepFunction/IStepFunction.cs
    startLine: 119
  assemblies:
  - Accordant
  namespace: Microsoft.Accordant
  summary: >-
    A step function that represents background work which will eventually complete.

    Subclasses must define <xref href="Microsoft.Accordant.TerminatingStepFunction.IsTerminalState" data-throw-if-not-resolved="false"></xref> to indicate when the work is done,

    and <xref href="Microsoft.Accordant.TerminatingStepFunction.GetStepResults(Microsoft.Accordant.State)" data-throw-if-not-resolved="false"></xref> to define how the state transitions.


    This is used for:

    - Test execution: Polling continues until IsTerminalState returns true for all states

    - Test generation: Unwinding continues until IsTerminalState returns true


    For daemon/fire-and-forget step functions that never terminate, use <xref href="Microsoft.Accordant.BaseStepFunction" data-throw-if-not-resolved="false"></xref> instead.


    For simple cases, use AsyncOperation.Create&lt;TState&gt;(Func&lt;TState, bool&gt;, Action&lt;TState&gt;) to create 

    an async operation inline without defining a class.
  example: []
  syntax:
    content: 'public abstract class TerminatingStepFunction : BaseStepFunction, IStepFunction'
    content.vb: Public MustInherit Class TerminatingStepFunction Inherits BaseStepFunction Implements IStepFunction
  inheritance:
