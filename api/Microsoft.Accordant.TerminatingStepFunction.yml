    id: IsTerminalState
    path: Accordant/StepFunction/IStepFunction.cs
    startLine: 128
  assemblies:
  - Accordant
  namespace: Microsoft.Accordant
  summary: >-
    Returns true when this step function's background work is complete.

    The predicate is evaluated against the current state.


    During polling: We keep polling until this returns true for all possible states.

    During unwinding: We keep applying step functions until this returns true.
  example: []
  syntax:
    content: public abstract Func<State, bool> IsTerminalState { get; }
    parameters: []
    return:
      type: System.Func{Microsoft.Accordant.State,System.Boolean}
    content.vb: Public MustOverride ReadOnly Property IsTerminalState As Func(Of State, Boolean)
  overload: Microsoft.Accordant.TerminatingStepFunction.IsTerminalState*
