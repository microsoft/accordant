    id: Default
    path: Accordant.Operations.Http/HttpExecutable.cs
    startLine: 53
  assemblies:
  - Accordant.Operations.Http
  namespace: Microsoft.Accordant
  summary: >-
    Returns the default instance of this class.


    The default instance serializes payloads using <xref href="System.Text.Json.JsonSerializer" data-throw-if-not-resolved="false"></xref>

    class, encoded as a UTF8 string with ContentType set to 'application/json'.


    The default instance deserializes the payload assuming the string is encoded as a JSON object.

    It uses <xref href="System.Text.Json.JsonSerializer" data-throw-if-not-resolved="false"></xref> to deserialize the payload, treating

    property names as case insensitive.
