  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: Fluent API for creating request derivations.
  example:
  - >-
    <pre><code class="lang-csharp">// Types on the right (method style)

    Derive.From&lt;CreateRequest, CreateResponse, DeleteRequest&gt;("CreateBlog")
          .When((req, resp) =&gt; resp.Success)
          .As((req, resp) =&gt; new DeleteRequest { Id = resp.Id })

    // Legacy: Types on As()

    Derive.From("CreateBlog")
          .As&lt;CreateRequest, CreateResponse, DeleteRequest&gt;((req, resp) =&gt; new DeleteRequest { Id = resp.Id })</code></pre>
