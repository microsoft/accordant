  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Executes this operation asynchronously against the system-under-test.


    Override this method for async operations, or override <xref href="Microsoft.Accordant.Operation%603.Execute(Microsoft.Accordant.TestingContext%2c%600)" data-throw-if-not-resolved="false"></xref>

    for simple synchronous operations. You can also set <xref href="Microsoft.Accordant.Operation%603.ExecuteFunc" data-throw-if-not-resolved="false"></xref> as an alternative.


    If only <xref href="Microsoft.Accordant.Operation%603.Execute(Microsoft.Accordant.TestingContext%2c%600)" data-throw-if-not-resolved="false"></xref> is overridden, this method

    automatically calls it and wraps the result in a completed task.
