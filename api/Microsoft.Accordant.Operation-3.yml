    id: Expect
    path: Accordant.Operations/Operation/Operation.cs
    startLine: 90
  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Provides type-inferred expect methods for use within the <xref href="Microsoft.Accordant.Operation%603.Apply(%600%2c%602)" data-throw-if-not-resolved="false"></xref> method.

    Using this property allows writing <code>Expect.That(r =&gt; ...)</code> and <code>.ThenState(s =&gt; ...)</code>

    without specifying the generic type parameters, since they are inferred from the operation's

    TResponse and TState types.
  example:
  - >-
    public override ExpectedOutcomes Apply(int value, StackState state)

    {
        // No need for Expect.That&lt;int&gt; or .ThenState&lt;StackState&gt;
        return Expect.That(r =&gt; r == value, "should equal value")
                     .ThenState(nextState =&gt; nextState.Items.Add(value));
    }
  syntax:
    content: protected ExpectContext<TResponse, TState> Expect { get; }
    parameters: []
    return:
      type: Microsoft.Accordant.ExpectContext{{TResponse},{TState}}
    content.vb: Protected ReadOnly Property Expect As ExpectContext(Of TResponse, TState)
