  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    The unified base class for operations.


    An Operation defines:

    - The spec/behavior via <xref href="Microsoft.Accordant.Operation%603.Apply(%600%2c%602)" data-throw-if-not-resolved="false"></xref> (required)

    - Execution logic via <xref href="Microsoft.Accordant.Operation%603.ExecuteAsync(Microsoft.Accordant.TestingContext%2c%600)" data-throw-if-not-resolved="false"></xref> (optional)

    - Request derivations via <xref href="Microsoft.Accordant.Operation%603.DerivedFrom" data-throw-if-not-resolved="false"></xref> (optional)

    - Polling setup via <xref href="Microsoft.Accordant.Operation%603.Polling" data-throw-if-not-resolved="false"></xref> (optional)
  example: []
