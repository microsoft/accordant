  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Creates an expected outcome with a ValidationResult-returning validator.

    This overload allows including the actual response value in error messages.

    Works well with FluentAssertions or FluentValidation libraries.
  example:
  - >-
    // Rich error message with actual value

    Expect.That&lt;int&gt;(r =&gt; r &gt; 0 
        ? ValidationResult.Valid() 
        : ValidationResult.Invalid($"Expected positive but got {r}"))
  syntax:
    content: public static ExpectedOutcomeBuilder<TResponse> That<TResponse>(Func<TResponse, ValidationResult> validator)
    parameters:
    - id: validator
      type: System.Func{{TResponse},Microsoft.Accordant.ValidationResult}
      description: >-
        A function that validates the response and returns a <xref href="Microsoft.Accordant.ValidationResult" data-throw-if-not-resolved="false"></xref>

        containing both the validity and an explanation message.
    typeParameters:
    - id: TResponse
      description: The type of response to validate.
    return:
      type: Microsoft.Accordant.ExpectedOutcomeBuilder{{TResponse}}
      description: An <xref href="Microsoft.Accordant.ExpectedOutcomeBuilder%601" data-throw-if-not-resolved="false"></xref> for further configuration.
