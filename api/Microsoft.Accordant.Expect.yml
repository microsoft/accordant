  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Fluent API for defining expected outcomes in Operation.Apply methods.

    Provides a more readable way to construct <xref href="Microsoft.Accordant.ExpectedOutcome" data-throw-if-not-resolved="false"></xref> and <xref href="Microsoft.Accordant.ExpectedOutcomes" data-throw-if-not-resolved="false"></xref>.
  example:
  - >-
    // Simple case - predicate validation, state unchanged

    return Expect.That&lt;int&gt;(r =&gt; r == state.Value, "should equal current value");


    // With state transition

    return Expect.That&lt;int&gt;(r =&gt; r == state.Value + 1, "should increment")
                 .ThenState(state with { Value = state.Value + 1 });

    // Response-dependent state (requires mock for exploration)

    return Expect.That&lt;PutResponse&gt;(r =&gt; r.ETag != null, "should have ETag")
                 .ThenState(
                     (resp, s) =&gt; s.WithETag(((PutResponse)resp).ETag),
                     mock: () =&gt; new PutResponse { ETag = Guid.NewGuid().ToString() });

    // With background activity

    return Expect.That&lt;CopyResponse&gt;(r =&gt; r.StatusCode == 202, "accepted")
                 .ThenState(state.WithPendingCopy())
                 .Triggers((resp, s) =&gt; new CopyCompletionStepFunction(...));

    // Multiple possible outcomes

    return Expect.OneOf(
        Expect.That&lt;int&gt;(r =&gt; r &gt; 0, "positive").ThenState(positiveState),
        Expect.That&lt;int&gt;(r =&gt; r == 0, "zero").ThenState(zeroState));
