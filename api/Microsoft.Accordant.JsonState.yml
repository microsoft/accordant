    id: ValidateNotMutated
    path: Accordant/State/JsonState.cs
    startLine: 478
  assemblies:
  - Accordant
  namespace: Microsoft.Accordant
  summary: >-
    Validates that the state has not been mutated since it was locked.

    Called by the framework after user code runs.

    Throws <xref href="Microsoft.Accordant.StateLockedException" data-throw-if-not-resolved="false"></xref> if mutation is detected.


    Note: Atomic properties are excluded from mutation detection

    (they're immutable by contract). Fingerprint properties are included.
  example: []
  syntax:
    content: public void ValidateNotMutated()
    content.vb: Public Sub ValidateNotMutated()
  overload: Microsoft.Accordant.JsonState.ValidateNotMutated*
