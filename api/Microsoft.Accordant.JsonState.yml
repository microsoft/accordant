    id: EnableMutationDetection
    path: Accordant/State/JsonState.cs
    startLine: 50
  assemblies:
  - Accordant
  namespace: Microsoft.Accordant
  summary: >-
    When enabled, the framework will detect if a JsonState was mutated after

    being locked and throw a <xref href="Microsoft.Accordant.StateLockedException" data-throw-if-not-resolved="false"></xref>.

    This helps catch bugs where users forget to clone before modifying.

    Default is true.


    This property is thread-safe and uses AsyncLocal, so each async execution

    context can have its own value. When not explicitly set in the current context,

    defaults to true.
  example: []
  syntax:
    content: public static bool EnableMutationDetection { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Shared Property EnableMutationDetection As Boolean
