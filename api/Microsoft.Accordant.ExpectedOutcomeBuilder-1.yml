  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Specifies a response-dependent next state.

    Use this when the next state depends on values in the response (e.g., server-generated IDs).
  remarks: >-
    <p>

    This method requires a mock response generator for state exploration during test generation.

    The mock response provides values when the real response is not yet available.

    </p>

    <p>

    For complex states where clone-and-mutate is more convenient,

    use <xref href="Microsoft.Accordant.ExpectedOutcomeBuilder%601.ThenState%60%601(System.Action%7b%600%2c%60%600%7d%2cSystem.Func%7b%600%7d)" data-throw-if-not-resolved="false"></xref> instead.

    </p>
  example:
  - >-
    return Expect.That&lt;CreateResponse&gt;(r =&gt; r.Success, "created successfully")
                 .WithNextState(
                     response =&gt; new MyState(response.Id),
                     mock: () =&gt; new CreateResponse { Id = "mock-id" });
  syntax:
    content: public ExpectedOutcomeBuilder<TResponse> WithNextState(Func<TResponse, State> nextStateFunc, Func<TResponse> mock)
    parameters:
