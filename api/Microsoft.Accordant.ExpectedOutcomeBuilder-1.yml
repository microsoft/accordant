      description: A function that takes the response and returns the next state.
    - id: mock
      type: System.Func{{TResponse}}
      description: A function that generates a mock response for state exploration.
    return:
      type: Microsoft.Accordant.ExpectedOutcomeBuilder`1
      description: This builder for method chaining.
    content.vb: Public Function WithNextState(nextStateFunc As Func(Of TResponse, State), mock As Func(Of TResponse)) As ExpectedOutcomeBuilder(Of TResponse)
