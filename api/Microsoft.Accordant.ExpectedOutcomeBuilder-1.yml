      type: Microsoft.Accordant.State
      description: The state to use after this operation.
    return:
      type: Microsoft.Accordant.ExpectedOutcomeBuilder`1
      description: This builder for method chaining.
    content.vb: Public Function WithNextState(nextState As State) As ExpectedOutcomeBuilder(Of TResponse)
