  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Specifies the exact next state to use after this operation.

    Use this for simple state types like <xref href="Microsoft.Accordant.AtomicState%601" data-throw-if-not-resolved="false"></xref> where you construct

    a new state instance rather than mutating a clone.
  remarks: >-
    <p>

    This method is ideal for:


    <ul><li><xref href="Microsoft.Accordant.AtomicState%601" data-throw-if-not-resolved="false"></xref> - simple value-based states</li></ul>

    </p>

    <p>

    For complex states with nested objects where clone-and-mutate is more convenient,

    use <xref href="Microsoft.Accordant.ExpectedOutcomeBuilder%601.ThenState%60%601(System.Action%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref> instead.

    </p>
  example:
  - >-
    return Expect.That&lt;int&gt;(r =&gt; r == expectedValue, "should equal expected")
                 .WithNextState(new AtomicState&lt;int&gt;(state.Value + request));
  syntax:
    content: public ExpectedOutcomeBuilder<TResponse> WithNextState(State nextState)
