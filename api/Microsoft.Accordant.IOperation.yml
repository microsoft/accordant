  summary: >-
    Returns all possible (response, next-state) pairs for state exploration.

    Used during test generation to explore the state space.
  example: []
  syntax:
    content: IList<(object, StateProfile)> Invoke(object request, State state)
    parameters:
    - id: request
      type: System.Object
      description: The request to apply.
    - id: state
      type: Microsoft.Accordant.State
      description: The current state.
    return:
      type: System.Collections.Generic.IList{System.ValueTuple{System.Object,Microsoft.Accordant.StateProfile}}
      description: List of possible (response, stateProfile) pairs.
