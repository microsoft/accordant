  namespace: Microsoft.Accordant
  summary: Fluent API for creating request derivations with types on the left side.
  example:
  - >-
    <pre><code class="lang-csharp">// Types on the left (like a type declaration)

    Derivation&lt;Todo, ApiResult&lt;Todo&gt;, (string, string)&gt;.From("CreateTodo")
        .When((req, resp) =&gt; resp.IsSuccess)
        .As((req, resp) =&gt; (resp.Data.UserId, resp.Data.TodoId))</code></pre>
  syntax:
