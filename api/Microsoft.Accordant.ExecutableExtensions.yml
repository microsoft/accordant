  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Executes the operation safely, catching any exceptions and returning them as the response.

    This ensures that the framework always receives a response (either the actual result or an exception).
  example: []
  syntax:
    content: public static Task<object> SafeExecuteAsync(this IOperation operation, TestingContext context, object request)
    parameters:
    - id: operation
      type: Microsoft.Accordant.IOperation
      description: The operation to invoke.
    - id: context
      type: Microsoft.Accordant.TestingContext
      description: The testing context.
    - id: request
      type: System.Object
      description: The request to execute.
    return:
      type: System.Threading.Tasks.Task{System.Object}
      description: >-
        The response from execution. If an exception is thrown during execution,

        the exception itself is returned as the response.
    content.vb: Public Shared Function SafeExecuteAsync(operation As IOperation, context As TestingContext, request As Object) As Task(Of Object)
