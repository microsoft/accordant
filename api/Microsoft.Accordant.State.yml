- uid: Microsoft.Accordant.State.Locked
  commentId: P:Microsoft.Accordant.State.Locked
  id: Locked
  parent: Microsoft.Accordant.State
  langs:
  - csharp
  - vb
  name: Locked
  nameWithType: State.Locked
  fullName: Microsoft.Accordant.State.Locked
  type: Property
  source:
    remote:
      path: Accordant/State/State.cs
      branch: main
      repo: https://github.com/microsoft/accordant.git
    id: Locked
    path: Accordant/State/State.cs
    startLine: 35
  assemblies:
  - Accordant
  namespace: Microsoft.Accordant
  summary: >-
    Indicates whether a state object is locked for modification or not.

    State objects are not locked when initially created so the user

    can modify the state in an 'imperative' fashion. They are then locked

    by the framework once returned from the method that created them so they

    are effectively immutable. Once locked, the only way to modify a state object

    is to clone it to create a new state object that can be modified till it's also

    eventually locked.
  example: []
  syntax:
    content: >-
      [JsonIgnore]

      public bool Locked { get; protected set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: >-
      <JsonIgnore>

      Public Property Locked As Boolean
  overload: Microsoft.Accordant.State.Locked*
  attributes:
  - type: System.Text.Json.Serialization.JsonIgnoreAttribute
    ctor: System.Text.Json.Serialization.JsonIgnoreAttribute.#ctor
    arguments: []
