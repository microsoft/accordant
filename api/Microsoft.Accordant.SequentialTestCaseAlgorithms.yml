  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    This algorithm ensures that each reachable state in the state space graph is

    visited at least once. It does not generate all possible operation call

    sequences - it only ensures that the set of generated test cases drive the system

    to each unique reachable state.
  example: []
  syntax:
    content: public static IList<SequentialTestCase> StateCoverage(TestingContext context, StateGraphNode rootNode)
    parameters:
    - id: context
      type: Microsoft.Accordant.TestingContext
    - id: rootNode
      type: Microsoft.Accordant.StateGraphNode
    return:
      type: System.Collections.Generic.IList{Microsoft.Accordant.SequentialTestCase}
    content.vb: Public Shared Function StateCoverage(context As TestingContext, rootNode As StateGraphNode) As IList(Of SequentialTestCase)
  overload: Microsoft.Accordant.SequentialTestCaseAlgorithms.StateCoverage*
