    id: CreateRandomWalk
    path: Accordant.Operations/GenerationAlgorithms/SequentialTestCaseAlgorithms.cs
    startLine: 141
  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    This algorithm generates test cases by performing random walks through the state graph.

    Each walk starts from the root and randomly selects edges until reaching a terminal state

    or the maximum walk length. Within a walk, each operation call can only appear once

    (edges leading to already-used operation calls are excluded). Duplicate test cases

    across walks are eliminated. This is useful for exploring large state spaces

    where exhaustive coverage is impractical.
  example: []
  syntax:
    content: public static SequentialTestCaseAlgorithm CreateRandomWalk(int numberOfWalks = 100, int maxWalkLength = 10, int? seed = null)
    parameters:
    - id: numberOfWalks
      type: System.Int32
      description: The number of random walks to perform.
    - id: maxWalkLength
      type: System.Int32
      description: Maximum steps per walk. -1 for unlimited (walks until no edges).
    - id: seed
      type: System.Nullable{System.Int32}
      description: Optional random seed for reproducibility. Null uses a random seed.
    return:
      type: Microsoft.Accordant.SequentialTestCaseAlgorithm
    content.vb: Public Shared Function CreateRandomWalk(numberOfWalks As Integer = 100, maxWalkLength As Integer = 10, seed As Integer? = Nothing) As SequentialTestCaseAlgorithm
