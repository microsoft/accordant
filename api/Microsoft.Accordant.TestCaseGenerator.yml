      type: Microsoft.Accordant.State
    - id: inputSet
      type: Microsoft.Accordant.InputSet
    - id: options
      type: Microsoft.Accordant.TestGenerationOptions
    return:
      type: Microsoft.Accordant.StateGraphNode
    content.vb: Public Shared Function ExploreStateSpace(context As TestingContext, startingState As State, inputSet As InputSet, options As TestGenerationOptions = Nothing) As StateGraphNode
