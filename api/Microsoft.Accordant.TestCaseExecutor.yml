  summary: >-
    Executes the given sequential test cases with the specified initial state.

    The provided context is used for all tests with registered services.
  example: []
  syntax:
    content: public static Task<IList<TestCaseExecutionResult>> ExecuteSequentialTestCases(TestingContext context, IList<SequentialTestCase> testCases, State initialState, TestExecutionOptions options)
    parameters:
    - id: context
      type: Microsoft.Accordant.TestingContext
      description: The testing context with registered services.
    - id: testCases
      type: System.Collections.Generic.IList{Microsoft.Accordant.SequentialTestCase}
      description: The test cases to execute.
    - id: initialState
      type: Microsoft.Accordant.State
      description: The initial state for each test.
    - id: options
      type: Microsoft.Accordant.TestExecutionOptions
      description: Execution options.
    return:
      type: System.Threading.Tasks.Task{System.Collections.Generic.IList{Microsoft.Accordant.TestCaseExecutionResult}}
      description: The execution results for each test case.
