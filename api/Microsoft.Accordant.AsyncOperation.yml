  assemblies:
  - Accordant
  namespace: Microsoft.Accordant
  summary: >-
    Creates an async operation with a single outcome.


    Example:


    <pre><code class="lang-csharp">.Triggers(AsyncOperation.Create&lt;PetImagesState&gt;(
        isTerminal: s =&gt; s.Images[name].State != "Creating",
        transition: nextState =&gt; {
            nextState.Images[name].State = "Created";
        }
    ))</code></pre>
  example: []
  syntax:
    content: 'public static TerminatingStepFunction Create<TState>(Func<TState, bool> isTerminal, Action<TState> transition, string name = null) where TState : State'
    parameters:
    - id: isTerminal
      type: System.Func{{TState},System.Boolean}
      description: Predicate that returns true when the background work is complete.
    - id: transition
      type: System.Action{{TState}}
      description: Action that mutates a cloned state to the next state. Only called when isTerminal is false.
    - id: name
      type: System.String
      description: Optional name for logging/debugging.
    typeParameters:
    - id: TState
      description: The state type.
    return:
      type: Microsoft.Accordant.TerminatingStepFunction
    content.vb: Public Shared Function Create(Of TState As State)(isTerminal As Func(Of TState, Boolean), transition As Action(Of TState), name As String = Nothing) As TerminatingStepFunction
