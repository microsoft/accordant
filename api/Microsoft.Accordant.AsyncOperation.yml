  assemblies:
  - Accordant
  namespace: Microsoft.Accordant
  summary: >-
    Creates an async operation with multiple non-deterministic outcomes.


    Example:


    <pre><code class="lang-csharp">.Triggers(AsyncOperation.Create&lt;PetImagesState&gt;(
        isTerminal: s =&gt; s.Images[name].State != "Creating",
        transitions: new Action&lt;PetImagesState&gt;[] {
            nextState =&gt; { nextState.Images[name].State = "Created"; },
            nextState =&gt; { nextState.Images[name].State = "Failed"; }
        }
    ))</code></pre>
  example: []
  syntax:
    content: 'public static TerminatingStepFunction Create<TState>(Func<TState, bool> isTerminal, Action<TState>[] transitions, string name = null) where TState : State'
    parameters:
    - id: isTerminal
      type: System.Func{{TState},System.Boolean}
      description: Predicate that returns true when the background work is complete.
    - id: transitions
      type: System.Action{{TState}}[]
      description: Array of actions, each defining one possible outcome. Each receives its own cloned state.
    - id: name
      type: System.String
      description: Optional name for logging/debugging.
    typeParameters:
    - id: TState
      description: The state type.
    return:
      type: Microsoft.Accordant.TerminatingStepFunction
    content.vb: Public Shared Function Create(Of TState As State)(isTerminal As Func(Of TState, Boolean), transitions As Action(Of TState)(), name As String = Nothing) As TerminatingStepFunction
