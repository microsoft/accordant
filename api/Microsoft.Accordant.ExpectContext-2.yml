  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Creates an expected outcome with a predicate-based response validator.

    The response type is inferred from the operation context.
  example:
  - >-
    return Expect.That(r =&gt; r &gt; 0, "should be positive")
                 .ThenState(nextState =&gt; nextState.Count++);
  syntax:
    content: public TypedExpectBuilder<TResponse, TState> That(Func<TResponse, bool> predicate, string explanation = null)
    parameters:
    - id: predicate
      type: System.Func{{TResponse},System.Boolean}
      description: A predicate that returns true if the response is valid.
    - id: explanation
      type: System.String
      description: A description of what the predicate checks (used in error messages).
    return:
      type: Microsoft.Accordant.TypedExpectBuilder{{TResponse},{TState}}
      description: A <xref href="Microsoft.Accordant.TypedExpectBuilder%602" data-throw-if-not-resolved="false"></xref> for further configuration.
    content.vb: Public Function That(predicate As Func(Of TResponse, Boolean), explanation As String = Nothing) As TypedExpectBuilder(Of TResponse, TState)
