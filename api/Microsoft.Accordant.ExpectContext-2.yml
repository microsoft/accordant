  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Provides type-inferred expect methods for use within an Operation.

    This class knows both the response type and state type, allowing methods

    like <xref href="Microsoft.Accordant.ExpectContext%602.That(System.Func%7b%600%2cSystem.Boolean%7d%2cSystem.String)" data-throw-if-not-resolved="false"></xref> and 

    <xref href="Microsoft.Accordant.TypedExpectBuilder%602.ThenState(System.Action%7b%601%7d)" data-throw-if-not-resolved="false"></xref>

    to work without explicit generic type parameters.
  example: []
  syntax:
    content: 'public class ExpectContext<TResponse, TState> where TState : State'
    typeParameters:
    - id: TResponse
      description: The response type of the operation.
    - id: TState
      description: The state type of the operation.
    content.vb: Public Class ExpectContext(Of TResponse, TState As State)
