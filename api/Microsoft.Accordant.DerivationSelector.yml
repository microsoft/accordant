    id: DerivationSelector
    path: Accordant.Operations/DerivationSelector.cs
    startLine: 27
  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Selects which request derivations should be generated during test case generation.

    Use <xref href="Microsoft.Accordant.DerivationSelector.For(System.String)" data-throw-if-not-resolved="false"></xref> to create instances with a fluent API.
  remarks: >-
    When generating test cases, derivations can produce many combinations. Use this selector

    to filter which derivations are actually generated:


    <ul><li>Filter by target operation (which operation is being derived)</li><li>Filter by source operation (what it derives from)</li><li>Filter by variant (e.g., "IfMatch" vs "IfNoneMatch")</li></ul>
  example:
  - >-
    <pre><code class="lang-csharp">options.DerivationSelectors = new[]

    {
        DerivationSelector.For("Delete"),                                  // All Delete derivations
        DerivationSelector.For("Delete").From("Create"),                   // Delete from Create only
        DerivationSelector.For("Delete").From("Create").Variant("IfMatch") // Specific variant
    };</code></pre>
  syntax:
    content: public class DerivationSelector
    content.vb: Public Class DerivationSelector
