  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    Configuration for polling behavior when an operation triggers background work

    via a <xref href="Microsoft.Accordant.TerminatingStepFunction" data-throw-if-not-resolved="false"></xref>.


    Polling uses a derivation to create the polling request from the original

    operation's request and response. The derivation must be defined on the

    polling operation's <xref href="Microsoft.Accordant.IOperation.DerivedFrom" data-throw-if-not-resolved="false"></xref> property.
  example: []
