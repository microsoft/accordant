    id: MaxDepth
    path: Accordant.Operations/TestGenerationOptions.cs
    startLine: 75
  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    This property controls the max depth of the state space graph

    to explore up to when generating test cases. This property

    is always checked before the <xref href="Microsoft.Accordant.TestGenerationOptions.StateConstraint" data-throw-if-not-resolved="false"></xref>

    property.


    Default is 5 to prevent unbounded exploration. Set to -1 for unlimited

    depth (use with caution - can cause infinite loops with cyclic state graphs).
  example: []
  syntax:
    content: public int MaxDepth { get; set; }
    parameters: []
    return:
      type: System.Int32
    content.vb: Public Property MaxDepth As Integer
