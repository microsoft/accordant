- uid: Microsoft.Accordant.TestGenerationOptions.ShouldUnwindStepFunction
  commentId: P:Microsoft.Accordant.TestGenerationOptions.ShouldUnwindStepFunction
  id: ShouldUnwindStepFunction
  parent: Microsoft.Accordant.TestGenerationOptions
  langs:
  - csharp
  - vb
  name: ShouldUnwindStepFunction
  nameWithType: TestGenerationOptions.ShouldUnwindStepFunction
  fullName: Microsoft.Accordant.TestGenerationOptions.ShouldUnwindStepFunction
  type: Property
  source:
    remote:
      path: Accordant.Operations/TestGenerationOptions.cs
      branch: main
      repo: https://github.com/microsoft/accordant.git
    id: ShouldUnwindStepFunction
    path: Accordant.Operations/TestGenerationOptions.cs
    startLine: 184
  assemblies:
  - Accordant.Operations
  namespace: Microsoft.Accordant
  summary: >-
    This lambda is used to decide whether step functions produced by operations should be "unwound" i.e.

    repeatedly applied till they reach their terminal state as defined by 

    <xref href="Microsoft.Accordant.TerminatingStepFunction.IsTerminalState" data-throw-if-not-resolved="false"></xref>.


    Step functions are typically used to model async background processes. As an example,

    you might have model an API where the user can upload an image, initially in the `Creating`

    state and which triggers a background async process that creates a thumbnail for the image,

    ultimately changing the state of the image to `Created` (or `Failed`, if it encounters a

    problem). This async functionality is typically modeled using step functions.


    The lambda receives an <xref href="Microsoft.Accordant.UnwindContext" data-throw-if-not-resolved="false"></xref> with the operation, request, state, and step function.

    Only <xref href="Microsoft.Accordant.TerminatingStepFunction" data-throw-if-not-resolved="false"></xref> instances can be unwound (they define their terminal state).


    Default: All terminating step functions are unwound.
  example: []
  syntax:
    content: public Func<UnwindContext, bool> ShouldUnwindStepFunction { get; set; }
    parameters: []
    return:
      type: System.Func{Microsoft.Accordant.UnwindContext,System.Boolean}
    content.vb: Public Property ShouldUnwindStepFunction As Func(Of UnwindContext, Boolean)
  overload: Microsoft.Accordant.TestGenerationOptions.ShouldUnwindStepFunction*
