    - id: path
      type: System.Collections.Generic.IReadOnlyList{System.ValueTuple{Microsoft.Accordant.IStepFunction,Microsoft.Accordant.StateGraphNode}}
    return:
      type: System.Collections.Generic.IList{Microsoft.Accordant.StepResult}
    content.vb: Function Apply(state As State, path As IReadOnlyList(Of (IStepFunction, StateGraphNode))) As IList(Of StepResult)
